<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('scale-95');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('scale-95');
            });
        });

        // Basic toggle for password visibility
        const togglePass = document.querySelector('button .material-symbols-outlined');
        const passInput = document.querySelector('#password');
        if(togglePass && passInput) {
            togglePass.parentElement.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                togglePass.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
