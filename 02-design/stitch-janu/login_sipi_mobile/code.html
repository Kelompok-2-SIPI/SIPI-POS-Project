<body class="bg-canvas text-on-surface antialiased selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex flex-col items-center justify-center p-lg">

<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-commerce-cobalt tracking-tight">SIPI</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Kelola UMKM F&B Anda</p>
</header>
<!-- Login Form Section -->
<main class="w-full max-w-sm">
<form class="space-y-lg" id="loginForm">
<!-- Email/Username Input -->
<div class="space-y-xs">
<label class="font-button-label text-button-label text-on-surface px-xs" for="identity">Email atau Username</label>

<span class="absolute right-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-button-label text-button-label text-on-surface" for="password">Kata Sandi</label>
<button class="text-caption font-caption text-commerce-cobalt hover:underline" type="button">Lupa Sandi?</button>
</div>
<div class="relative">
<input class="w-full h-tap-target px-md rounded-lg border border-hairline bg-surface-container-lowest font-body-md text-body-md focus:border-commerce-cobalt focus:ring-2 focus:ring-primary-fixed transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-tap-target bg-commerce-cobalt text-on-primary rounded-full font-button-label text-button-label shadow-sm active:scale-[0.98] login-transition hover:bg-primary transition-all flex items-center justify-center gap-sm mt-xl" type="submit">
                Masuk
                <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>

<!-- Social/Alternative Login Divider -->
<div class="flex items-center gap-md my-xl">
<div class="h-[1px] flex-1 bg-hairline"></div>

<!-- Decorative Bottom Gradient for Depth -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface-container-low/50 to-transparent pointer-events-none -z-10"></div>
<script>
        // Password Visibility Toggle
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePassword');
        
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = toggleBtn.querySelector('.material-symbols-outlined');
            icon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            icon.setAttribute('data-icon', type === 'password' ? 'visibility_off' : 'visibility');
        });

        // Simple login form animation/feedback
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Visual loading state
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Memproses...`;
            btn.classList.add('opacity-80');

            // Simulate server delay
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Berhasil`;
                btn.classList.remove('bg-commerce-cobalt');
                btn.classList.add('bg-success-green');
                
                // Final interaction
                setTimeout(() => {
                    console.log('Redirecting to dashboard...');
                    // In a real app: window.location.href = '/dashboard';
                }, 800);
            }, 1500);
        });

        // Atmospheric micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
