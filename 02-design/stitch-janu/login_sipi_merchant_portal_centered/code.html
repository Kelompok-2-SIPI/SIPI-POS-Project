<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        body {
            background-color: #f9f9fd;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            box-shadow: 0 4px 60px rgba(0, 0, 0, 0.05), 0 2px 10px rgba(0, 0, 0, 0.02);
        }

        .input-focus-ring:focus {
            outline: none;
            border-color: #0064E0;
            box-shadow: 0 0 0 4px rgba(0, 100, 224, 0.1);
        }
        
        .floating-label-group {
            position: relative;
        }
        
        .floating-label-group input:placeholder-shown ~ label {
            transform: translateY(12px);
            font-size: 16px;
            color: #727786;
        }
        
        .floating-label-group label {
            position: absolute;
            top: 0;
            left: 12px;
            padding: 0 4px;
            background: white;
            transition: all 0.2s ease;
            pointer-events: none;
            font-size: 12px;
            color: #0064E0;
            transform: translateY(-8px);
        }

        /* Prevent chrome autofill yellow background */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }

<body class="min-h-screen flex items-center justify-center p-lg">
<!-- Background Pattern/Atmosphere -->
<div class="fixed inset-0 z-[-1] overflow-hidden opacity-30 pointer-events-none">
<div class="absolute -top-1/4 -left-1/4 w-1/2 h-1/2 bg-commerce-cobalt/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-1/2 h-1/2 bg-commerce-cobalt/5 blur-[120px] rounded-full"></div>
</div>
<!-- Main Login Shell (Linear Transactional - Navigation Suppressed) -->
<main class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="bg-canvas login-card rounded-[32px] p-xl flex flex-col items-center">
<!-- Brand Identity Anchor -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center gap-2 mb-sm">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-[32px]">storefront</span>
</div>
<h1 class="font-headline-lg text-headline-lg tracking-tight text-primary">SIPI</h1>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Merchant Portal</p>
</div>
<!-- Login Form Content -->
<form action="#" class="w-full space-y-lg" method="POST">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-button-label text-button-label text-on-surface ml-1" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">mail</span>
<input class="w-full h-tap-target pl-12 pr-4 bg-white border border-hairline rounded-xl font-body-md text-body-md text-on-surface input-focus-ring transition-all placeholder:text-outline/50" id="email" name="email" placeholder="nama@bisnisanda.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-end ml-1">
<label class="font-button-label text-button-label text-on-surface" for="password">Password</label>
<a class="font-caption text-caption text-secondary hover:underline transition-all" href="#">Lupa Password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">lock</span>
<input class="w-full h-tap-target pl-12 pr-12 bg-white border border-hairline rounded-xl font-body-md text-body-md text-on-surface input-focus-ring transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 py-1">
<input class="w-5 h-5 rounded-md border-hairline text-commerce-cobalt focus:ring-commerce-cobalt transition-all cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Ingat saya di perangkat ini</label>
</div>
<!-- Primary Action -->
<button class="w-full h-[56px] bg-commerce-cobalt hover:bg-primary transition-all text-on-primary font-button-label text-button-label rounded-full shadow-lg shadow-commerce-cobalt/20 active:scale-[0.98] duration-150 flex items-center justify-center gap-2" type="submit">
                    Masuk
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions/Footer -->
<div class="mt-xl text-center space-y-md">
<div class="relative">
<div class="absolute inset-0 flex items-center"><span class="w-full border-t border-hairline"></span></div>
<div class="relative flex justify-center text-caption"><span class="bg-canvas px-4 text-outline">Atau masuk dengan</span></div>
</div>
<div class="grid grid-cols-1 gap-sm">
<button class="w-full h-tap-target border border-hairline rounded-full flex items-center justify-center gap-3 font-button-label text-button-label text-on-surface hover:bg-surface-container-low transition-all">

                        Google
                    </button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Belum punya akun? 
                    <a class="text-secondary font-bold hover:underline" href="#">Daftar Sekarang</a>
</p>
</div>
</div>
<!-- Help & Legal Footer -->
<footer class="mt-lg flex justify-center gap-lg font-caption text-caption text-outline">
<a class="hover:text-on-surface transition-colors" href="#">Pusat Bantuan</a>
<a class="hover:text-on-surface transition-colors" href="#">Kebijakan Privasi</a>
<a class="hover:text-on-surface transition-colors" href="#">Syarat & Ketentuan</a>
</footer>
</main>
<!-- AI Assistant Floating Button (Contextual Suppression Logic applied for Transactional screen, but keeping for stylistic consistency if mandated by UI guidelines, usually hidden on login) -->
<!-- Suppressed on Login per UX guidelines -->
<script>
        // Micro-interaction for password visibility
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        const iconSpan = toggleBtn.querySelector('span');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            iconSpan.innerText = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Simple form handling simulation
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Memproses...';
            
            setTimeout(() => {
                alert('Sistem sedang dalam pengembangan. Silakan hubungi admin SIPI.');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }, 1500);
        });
    </script>
</body></html>
