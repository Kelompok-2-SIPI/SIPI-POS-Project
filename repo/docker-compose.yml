version: '3.9'

services:
  database:
    image: postgres:16-alpine
    container_name: sipi_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sipi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sipi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sipi_pos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sipi} -d ${POSTGRES_DB:-sipi_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sipi_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sipi}:${POSTGRES_PASSWORD:-sipi_secret}@database:5432/${POSTGRES_DB:-sipi_pos}
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      database:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sipi_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
    name: sipi_postgres_data
