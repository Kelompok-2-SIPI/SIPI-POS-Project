version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sipi_db
    restart: always
    environment:
      POSTGRES_USER: sipi_user
      POSTGRES_PASSWORD: sipi_password
      POSTGRES_DB: sipi_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sipi_user -d sipi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: sipi_web
    restart: always
    ports:
      - "3080:3000"
    environment:
      DATABASE_URL: "postgresql://sipi_user:sipi_password@db:5432/sipi_db"
      NODE_ENV: "development"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
